<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Strona w budowie</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            color: #e5e7eb;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2.4rem;
            margin-bottom: 0.8rem;
        }
        p {
            font-size: 1rem;
            color: #9ca3af;
            margin-top: 0;
        }
        .tag {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.4rem 0.9rem;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.16);
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Strona w budowie</h1>
        <p>Pracujemy nad nową odsłoną serwisu. Zapraszamy wkrótce.</p>
        <div class="tag">Wkrótce online</div>
    </div>
</body>
</html>
